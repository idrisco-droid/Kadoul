<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050e16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="الكادول">
<meta name="mobile-web-app-capable" content="yes">
<title>الكادول - شجرة عائلة جايرنجي</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4af37;
    --gold-dim: rgba(212,175,55,0.25);
    --bg: #050e16;
    --bg2: #081624;
    --bg3: #0d1f2d;
    --text: #e0d0b0;
    --text-dim: #7a9ab5;
    --male: #1a6b8a;
    --female: #8a3a6b;
    --dead: #444;
    --green: #1a6b3a;
    --red: #6b1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Amiri', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  input, select, button { font-family: 'Amiri', serif; }

  /* ===== HEADER ===== */
  #header {
    background: linear-gradient(90deg,#0a1e2e,#0f2840,#0a1e2e);
    border-bottom: 1px solid var(--gold-dim);
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 90;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #header .logo { }
  #header .logo h1 { font-size: 24px; color: var(--gold); letter-spacing: 2px; text-shadow: 0 0 20px rgba(212,175,55,0.4); }
  #header .logo p { font-size: 11px; color: var(--text-dim); }
  #header-btns { display: flex; gap: 8px; }
  .hbtn {
    background: rgba(212,175,55,0.1); border: 1px solid var(--gold-dim);
    color: var(--gold); border-radius: 10px; padding: 6px 12px;
    cursor: pointer; font-size: 12px; white-space: nowrap;
  }
  .hbtn.green { background: linear-gradient(135deg,#1a6b3a,#0d4025); color: #c8f0d0; border-color: transparent; }

  /* ===== SEARCH BAR ===== */
  #searchbar {
    padding: 10px 14px;
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  #searchbar input {
    width: 100%; background: rgba(255,255,255,0.05);
    border: 1px solid var(--gold-dim); border-radius: 12px;
    color: var(--text); padding: 9px 14px; font-size: 14px; outline: none;
  }
  #searchbar input::placeholder { color: var(--text-dim); }

  /* ===== STATS ===== */
  #stats {
    display: flex; gap: 8px; padding: 8px 14px;
    overflow-x: auto; border-bottom: 1px solid rgba(255,255,255,0.04);
    scrollbar-width: none;
  }
  #stats::-webkit-scrollbar { display: none; }
  .stat-box {
    background: rgba(255,255,255,0.04); border-radius: 10px;
    padding: 6px 14px; flex-shrink: 0; text-align: center; min-width: 70px;
  }
  .stat-box .sv { font-size: 18px; font-weight: bold; }
  .stat-box .sl { color: var(--text-dim); font-size: 10px; }

  /* ===== TABS ===== */
  #tabs {
    display: flex; background: rgba(0,0,0,0.3);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .tab {
    flex: 1; padding: 10px; text-align: center; cursor: pointer;
    font-size: 13px; color: var(--text-dim);
    border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ===== MAIN ===== */
  #main { padding: 14px; padding-bottom: 120px; }

  /* ===== TREE ===== */
  #tree-wrap { overflow-x: auto; padding-bottom: 10px; }
  .ancestors-row {
    display: flex; flex-wrap: wrap; gap: 16px;
    justify-content: center; padding: 10px 0;
  }
  .anc-card {
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer; min-width: 80px;
  }
  .anc-card .branch-preview {
    display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; justify-content: center;
  }

  /* Node */
  .node-wrap { display: flex; flex-direction: column; align-items: center; }
  .node-children {
    display: flex; gap: 10px; position: relative;
    padding-top: 0;
  }
  .node-children::before {
    content: '';
    position: absolute; top: 0; left: 15%; right: 15%;
    height: 1px; background: var(--gold-dim);
  }
  .node-col { display: flex; flex-direction: column; align-items: center; }
  .vline { width: 1px; background: var(--gold-dim); }

  /* Avatar */
  .avatar {
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0; position: relative;
    border: 2px solid var(--gold-dim);
    transition: all 0.2s; cursor: pointer;
  }
  .avatar.selected { border-color: var(--gold); box-shadow: 0 0 18px rgba(212,175,55,0.5); }
  .avatar.male { background: linear-gradient(135deg,#1a6b8a,#0d3f54); }
  .avatar.female { background: linear-gradient(135deg,#8a3a6b,#540d3f); }
  .avatar.dead { background: linear-gradient(135deg,#444,#222); border-color: #555; }
  .avatar img { width:100%;height:100%;object-fit:cover; }
  .avatar .initials { color:#fff; font-weight:bold; }
  .avatar .dead-label {
    position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.6);
    color:#999;font-size:8px;text-align:center;padding:1px 0;
  }
  .node-name {
    text-align: center; margin-top: 6px; max-width: 72px;
    font-size: 11px; color: #c8b870; line-height: 1.3;
  }
  .node-name.big { font-size: 13px; color: var(--gold); font-weight: bold; max-width: 90px; }
  .expand-badge {
    background: #1a4060; color: var(--gold);
    border-radius: 20px; font-size: 9px; padding: 1px 5px;
    border: 1px solid var(--gold-dim); margin-top: 3px;
    cursor: pointer;
  }

  /* ===== LIST VIEW ===== */
  .list-item {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid transparent;
    border-radius: 12px; padding: 10px 12px; margin-bottom: 8px;
    cursor: pointer; transition: all 0.2s;
  }
  .list-item.selected { background: rgba(212,175,55,0.08); border-color: var(--gold-dim); }
  .list-item-info { flex:1; }
  .list-item-name { font-size: 15px; color: #d4c080; }
  .list-item-sub { font-size: 11px; color: #5a8a9a; margin-top: 2px; }
  .status-badge {
    border-radius: 20px; padding: 3px 10px; font-size: 11px;
  }
  .status-badge.alive { background: rgba(40,180,80,0.15); color: #50e090; }
  .status-badge.dead { background: rgba(120,120,120,0.15); color: #888; }

  /* ===== BOTTOM CARD ===== */
  #person-card {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(5,14,22,0.97);
    border-top: 1px solid var(--gold-dim);
    padding: 14px;
    z-index: 200;
    max-height: 70vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }
  #person-card.open { transform: translateY(0); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .card-close { background:none;border:none;color:#666;cursor:pointer;font-size:22px;padding:4px; }
  .card-name { color: var(--gold); font-size: 20px; font-weight: bold; }
  .card-rel { color: var(--text-dim); font-size: 13px; }
  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .card-field { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 6px 10px; }
  .card-field-label { color: #7a9ab5; font-size: 10px; margin-bottom: 2px; }
  .card-field-val { color: #e0d0b0; font-size: 13px; }
  .children-section { margin-bottom: 14px; }
  .children-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .child-chip {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.05); border-radius: 20px;
    padding: 3px 10px 3px 6px; cursor: pointer;
  }
  .child-chip-name { color: #c8b870; font-size: 12px; }
  .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .card-btn {
    border: none; border-radius: 8px; padding: 7px 14px;
    cursor: pointer; font-size: 12px; color: var(--text);
  }
  .card-btn.add { background: linear-gradient(135deg,#1a6b3a,#0d4025); color: #c8f0d0; }
  .card-btn.edit { background: linear-gradient(135deg,#1a4a6b,#0d2a4a); color: #c8e0f0; }
  .card-btn.rel { background: linear-gradient(135deg,#5a3a1a,#3a2010); color: #f0d8a0; }
  .card-btn.del { background: linear-gradient(135deg,#6b1a1a,#4a0d0d); color: #f0c0c0; }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    display: flex; align-items: center; justify-content: center;
    z-index: 500; padding: 16px;
  }
  .modal-box {
    background: linear-gradient(160deg,#0a1820,#0d2030);
    border: 1px solid var(--gold-dim); border-radius: 20px;
    padding: 24px; width: 100%; max-width: 420px;
    max-height: 92vh; overflow-y: auto;
  }
  .modal-title { color: var(--gold); font-size: 20px; margin-bottom: 18px; font-weight: bold; }
  .form-group { margin-bottom: 14px; }
  .form-label { color: var(--text-dim); font-size: 12px; display: block; margin-bottom: 4px; }
  .form-input {
    width: 100%; background: rgba(255,255,255,0.06);
    border: 1px solid var(--gold-dim); border-radius: 8px;
    color: var(--text); padding: 9px 12px; font-size: 14px; outline: none;
  }
  .form-select {
    width: 100%; background: var(--bg3);
    border: 1px solid var(--gold-dim); border-radius: 8px;
    color: var(--text); padding: 9px 12px; font-size: 14px; outline: none;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save {
    flex: 1; background: linear-gradient(135deg,#1a6b3a,#0d4025);
    color: #c8f0d0; border: none; border-radius: 10px; padding: 11px;
    cursor: pointer; font-size: 15px;
  }
  .btn-cancel {
    flex: 1; background: rgba(255,255,255,0.06); color: var(--text-dim);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 11px;
    cursor: pointer; font-size: 15px;
  }
  .photo-preview {
    width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; overflow: hidden;
    border: 2px solid var(--gold-dim);
  }
  .photo-hint { text-align: center; color: #5a7a8a; font-size: 11px; margin-bottom: 16px; }

  /* Relation modal */
  .rel-person-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px; cursor: pointer;
    margin-bottom: 4px; border: 1px solid transparent;
    transition: all 0.15s;
  }
  .rel-person-row:active { background: rgba(212,175,55,0.1); }
  .rel-person-row.sel { background: rgba(212,175,55,0.12); border-color: var(--gold-dim); }
  .rel-saved-item {
    background: rgba(212,175,55,0.08); border-radius: 8px;
    padding: 6px 12px; margin-bottom: 6px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; color: var(--text);
  }
  .rel-del-btn { background:none;border:none;color:#854;cursor:pointer;font-size:16px; }

  /* Confirm modal */
  .confirm-icon { font-size: 44px; text-align: center; margin-bottom: 12px; }
  .confirm-msg { color: var(--text); font-size: 16px; text-align: center; margin-bottom: 8px; }
  .confirm-sub { color: var(--text-dim); font-size: 12px; text-align: center; margin-bottom: 20px; }

  /* ===== INSTALL BANNER ===== */
  #install-banner {
    background: linear-gradient(90deg,#0d2a1a,#1a4a2a);
    border: 1px solid rgba(80,220,130,0.3);
    border-radius: 12px; margin: 10px 14px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  #install-banner .ib-text { flex: 1; }
  #install-banner .ib-title { color: #50e090; font-size: 13px; font-weight: bold; }
  #install-banner .ib-sub { color: #3a9a60; font-size: 11px; margin-top: 2px; }
  #install-banner .ib-btn {
    background: #1a6b3a; color: #c8f0d0; border: none;
    border-radius: 8px; padding: 7px 14px; cursor: pointer; font-size: 12px;
    white-space: nowrap;
  }
  #install-banner .ib-close {
    background: none; border: none; color: #3a7a50; cursor: pointer; font-size: 18px;
  }

  .section-label { color: var(--text-dim); font-size: 11px; margin-bottom: 8px; }
  .hidden { display: none !important; }
  
  #expand-all-btn {
    display: flex; justify-content: center; margin-bottom: 12px;
  }
  #expand-all-btn button {
    background: rgba(255,255,255,0.05); border: 1px solid var(--gold-dim);
    color: var(--text-dim); border-radius: 8px; padding: 5px 16px;
    cursor: pointer; font-size: 12px;
  }

  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.25s ease; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 4px; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="logo">
    <h1>الكادول</h1>
    <p>شجرة عائلة جايرنجي</p>
  </div>
  <div id="header-btns">
    <button class="hbtn" onclick="toggleView()">📋 <span id="view-label">قائمة</span></button>
    <button class="hbtn green" onclick="openAddAncestor()">+ جد</button>
  </div>
</div>

<!-- INSTALL BANNER -->
<div id="install-banner">
  <div style="font-size:26px">📲</div>
  <div class="ib-text">
    <div class="ib-title">أضف التطبيق للشاشة الرئيسية</div>
    <div class="ib-sub">يعمل بدون إنترنت مثل تطبيق حقيقي</div>
  </div>
  <<button class="ib-btn" onclick="showInstallHelp()">كيف؟</button>
  <button class="ib-close" onclick="document.getElementById('install-banner').style.display='none'">✕</button>
</div>

<!-- SEARCH -->
<div id="searchbar">
  <input type="text" id="search-input" placeholder="🔍 ابحث عن عضو في العائلة..." oninput="renderAll()">
</div>

<!-- STATS -->
<div id="stats"></div>

<!-- TABS -->
<div id="tabs">
  <div class="tab active" onclick="setTab('tree')" id="tab-tree">🌳 الشجرة</div>
  <div class="tab" onclick="setTab('list')" id="tab-list">📋 القائمة</div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="view-tree">
    <div id="expand-all-btn"><button onclick="toggleExpandAll()">🔽 توسيع الكل</button></div>
    <div id="tree-container"></div>
  </div>
  <div id="view-list" class="hidden"></div>
</div>

<!-- PERSON CARD (bottom) -->
<div id="person-card">
  <div id="card-inner"></div>
</div>

<!-- MODALS -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal-box" class="modal-box"></div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const RELATIONS = ["جد","جدة","أب","أم","ابن","ابنة","أخ","أخت","عم","عمة","خال","خالة","ابن عم","ابنة عم","ابن خال","ابنة خال","حفيد","حفيدة","زوج","زوجة","صهر","كنة","قريب","قريبة"];
const MARITAL = ["أعزب","أعزبة","متزوج","متزوجة","مطلق","مطلقة","أرمل","أرملة"];

const DEFAULT_DATA = {
  id: "root", name: "جايرنجي", type: "family",
  children: [
    { id:"g1", name:"الجد علي", gender:"ذكر", status:"متوفى", maritalStatus:"متزوج", phone:"", address:"دنقلا", photo:null, relation:"جد",
      children:[
        { id:"g1s1", name:"محمد الكبير علي", gender:"ذكر", status:"متوفى", maritalStatus:"متزوج", phone:"09", address:"دنقلا ", photo:null, relation:"ابن",
          children:[
            { id:"g1s1c1", name:" محمد", gender:"ذكر", status:"متوفى", maritalStatus:"متزوج", phone:"0551234567", address:" دنقلا", photo:null, relation:"ابن", children:[] },
            { id:"g1s1c2", name:"احمد علي", gender:"ذكر", status:"متوفى", maritalStatus:"متزوج", phone:"0561234567", address:"دنقلا", photo:null, relation:"ابن", children:[] },
          ]
        },
        { id:"g1s2", name:"طه علي", gender:"ذكر", status:"حي", maritalStatus:"متزوج", phone:"0509876543", address:"متوفى ابن", photo:null, relation:"ابن",
          children:[
            { id:"g1s2c1", name:"خالد أحمد", gender:"ذكر", status:"حي", maritalStatus:"أعزب", phone:"", address:"", photo:null, relation:"حفيد", children:[] },
          ]
        },
        { id:"g1d1", name:"فاطمة سالم", gender:"أنثى", status:"حي", maritalStatus:"متزوجة", phone:"0507654321", address:"جدة", photo:null, relation:"ابنة", children:[] },
      ]
    },
    { id:"g2", name:"جد عبدالله", gender:"ذكر", status:"متوفى", maritalStatus:"متزوج", phone:"", address:"الحي الغربي", photo:null, relation:"جد",
      children:[
        { id:"g2s1", name:"علي عبدالله", gender:"ذكر", status:"حي", maritalStatus:"متزوج", phone:"0512345678", address:"حي السلام", photo:null, relation:"ابن",
          children:[
            { id:"g2s1c1", name:"سارة علي", gender:"أنثى", status:"حي", maritalStatus:"أعزبة", phone:"0562345678", address:"حي السلام", photo:null, relation:"حفيدة", children:[] },
            { id:"g2s1c2", name:"يوسف علي", gender:"ذكر", status:"حي", maritalStatus:"أعزب", phone:"", address:"", photo:null, relation:"حفيد", children:[] },
          ]
        },
        { id:"g2d1", name:"مريم عبدالله", gender:"أنثى", status:"حي", maritalStatus:"متزوجة", phone:"0523456789", address:"مكة", photo:null, relation:"ابنة", children:[] },
      ]
    },
    { id:"g3", name:"جد حمد", gender:"ذكر", status:"حي", maritalStatus:"متزوج", phone:"0534567890", address:"الحي الشرقي", photo:null, relation:"جد", children:[] },
  ]
};

let DB = JSON.parse(localStorage.getItem('kadoul_db') || 'null') || DEFAULT_DATA;
let expandedNodes = new Set();
let selectedId = null;
let currentView = 'tree';
let expandAll = false;
let relSaved = {};

function saveDB() { localStorage.setItem('kadoul_db', JSON.stringify(DB)); }

function genId() { return 'p' + Date.now() + Math.random().toString(36).slice(2,6); }

function findNode(tree, id) {
  if (!tree) return null;
  if (tree.id === id) return tree;
  for (const c of (tree.children||[])) { const f = findNode(c,id); if(f) return f; }
  return null;
}

function findParent(tree, id) {
  for (const c of (tree.children||[])) {
    if (c.id === id) return tree;
    const f = findParent(c, id);
    if(f) return f;
  }
  return null;
}

function getAllNodes(tree) {
  if (!tree || tree.id === 'root') {
    const r = [];
    for (const c of (tree?.children||[])) r.push(...getAllNodes(c));
    return r;
  }
  return [tree, ...(tree.children||[]).flatMap(c => getAllNodes(c))];
}

function addNode(parentId, node) {
  const p = findNode(DB, parentId);
  if(p) { if(!p.children) p.children=[]; p.children.push(node); }
  saveDB();
}

function updateNode(node) {
  const n = findNode(DB, node.id);
  if(n) Object.assign(n, node);
  saveDB();
}

function deleteNode(id) {
  function rm(parent) {
    if(!parent.children) return;
    parent.children = parent.children.filter(c => c.id !== id);
    parent.children.forEach(c => rm(c));
  }
  rm(DB);
  saveDB();
}

// ============================================================
// RENDER
// ============================================================
function renderAll() {
  renderStats();
  if (currentView === 'tree') renderTree();
  else renderList();
}

function renderStats() {
  const all = getAllNodes(DB);
  const stats = [
    { v: all.length, l: 'إجمالي الأفراد', c: '#d4af37' },
    { v: all.filter(n=>n.status==='حي').length, l: 'الأحياء', c: '#50e090' },
    { v: all.filter(n=>n.status==='متوفى').length, l: 'المتوفون', c: '#888' },
    { v: all.filter(n=>n.gender==='ذكر').length, l: 'ذكور', c: '#5ab0e0' },
    { v: all.filter(n=>n.gender==='أنثى').length, l: 'إناث', c: '#e05ab0' },
  ];
  document.getElementById('stats').innerHTML = stats.map(s =>
    `<div class="stat-box"><div class="sv" style="color:${s.c}">${s.v}</div><div class="sl">${s.l}</div></div>`
  ).join('');
}

// --- TREE ---
function renderTree() {
  const q = document.getElementById('search-input').value.trim();
  const cont = document.getElementById('tree-container');
  if (q) {
    const all = getAllNodes(DB).filter(n => n.name.includes(q));
    cont.innerHTML = `<div class="ancestors-row">${all.map(n => avatarNodeHTML(n, 60, true)).join('')}</div>`;
    return;
  }
  // Render ancestors row
  const ancsHTML = DB.children.map(anc => ancestorCardHTML(anc)).join('');
  cont.innerHTML = `<div class="ancestors-row fade-in">${ancsHTML}</div>`;
  // Expanded node sub-tree
  if (selectedId && expandedNodes.has(selectedId)) {
    const node = findNode(DB, selectedId);
    if (node && node.children && node.children.length > 0) {
      const subDiv = document.createElement('div');
      subDiv.style.cssText = 'margin-top:10px;overflow-x:auto;padding:4px;';
      subDiv.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;">${treeNodeHTML(node, 0)}</div>`;
      cont.appendChild(subDiv);
    }
  }
}

function ancestorCardHTML(node) {
  const cls = `avatar ${node.gender==='ذكر'?'male':'female'} ${node.status==='متوفى'?'dead':''} ${selectedId===node.id?'selected':''}`;
  const initials = node.name.split(' ').map(w=>w[0]).join('').slice(0,2);
  const childCount = (node.children||[]).length;
  const photoEl = node.photo ? `<img src="${node.photo}" alt="">` : `<span class="initials" style="font-size:20px">${initials}</span>`;
  const deadEl = node.status==='متوفى' ? `<div class="dead-label">رحمه الله</div>` : '';
  return `
    <div class="anc-card" onclick="selectNode('${node.id}')">
      <div class="${cls}" style="width:72px;height:72px">${photoEl}${deadEl}</div>
      <div class="node-name big">${node.name}</div>
      ${childCount>0 ? `<div class="expand-badge" onclick="event.stopPropagation();toggleExpand('${node.id}')">${childCount} ${expandedNodes.has(node.id)?'▲':'▼'}</div>` : ''}
    </div>`;
}

function treeNodeHTML(node, depth) {
  if (!node || node.id === 'root') return '';
  const sz = depth===0?68:depth===1?54:42;
  const cls = `avatar ${node.gender==='ذكر'?'male':'female'} ${node.status==='متوفى'?'dead':''} ${selectedId===node.id?'selected':''}`;
  const initials = node.name.split(' ').map(w=>w[0]).join('').slice(0,2);
  const photoEl = node.photo ? `<img src="${node.photo}" alt="">` : `<span class="initials" style="font-size:${sz*0.28}px">${initials}</span>`;
  const deadEl = node.status==='متوفى' ? `<div class="dead-label">رحمه الله</div>` : '';
  const hasChildren = node.children && node.children.length > 0;
  const isExp = expandAll || expandedNodes.has(node.id);

  const childrenHTML = hasChildren && isExp ? `
    <div style="width:1px;height:16px;background:rgba(212,175,55,0.2);margin:0 auto;"></div>
    <div class="node-children">
      ${node.children.map(c => `
        <div class="node-col">
          <div class="vline" style="height:14px;"></div>
          ${treeNodeHTML(c, depth+1)}
        </div>`).join('')}
    </div>` : '';

  return `
    <div class="node-wrap">
      <div style="display:flex;flex-direction:column;align-items:center;cursor:pointer;" onclick="selectNode('${node.id}')">
        <div class="${cls}" style="width:${sz}px;height:${sz}px">${photoEl}${deadEl}</div>
        <div class="node-name ${depth===0?'big':''}">${node.name}</div>
        ${hasChildren ? `<div class="expand-badge" onclick="event.stopPropagation();toggleExpand('${node.id}')">${node.children.length} ${isExp?'▲':'▼'}</div>` : ''}
      </div>
      ${childrenHTML}
    </div>`;
}

function avatarNodeHTML(node, sz=52, clickable=false) {
  const cls = `avatar ${node.gender==='ذكر'?'male':'female'} ${node.status==='متوفى'?'dead':''} ${selectedId===node.id?'selected':''}`;
  const initials = node.name.split(' ').map(w=>w[0]).join('').slice(0,2);
  const photoEl = node.photo ? `<img src="${node.photo}" alt="">` : `<span class="initials" style="font-size:${sz*0.28}px">${initials}</span>`;
  const deadEl = node.status==='متوفى' ? `<div class="dead-label">rحمه الله</div>` : '';
  return `
    <div style="display:flex;flex-direction:column;align-items:center;cursor:pointer;" onclick="${clickable?`selectNode('${node.id}')`:''}" >
      <div class="${cls}" style="width:${sz}px;height:${sz}px">${photoEl}${deadEl}</div>
      <div class="node-name" style="font-size:11px">${node.name}</div>
    </div>`;
}

// --- LIST ---
function renderList() {
  const q = document.getElementById('search-input').value.trim();
  const all = getAllNodes(DB).filter(n => !q || n.name.includes(q));
  document.getElementById('view-list').innerHTML = all.map(n => `
    <div class="list-item ${selectedId===n.id?'selected':''}" onclick="selectNode('${n.id}')">
      ${avatarNodeHTML(n, 44)}
      <div class="list-item-info">
        <div class="list-item-name">${n.name}</div>
        <div class="list-item-sub">${n.relation||''} · ${n.address||'—'} · ${n.phone||'—'}</div>
      </div>
      <div class="status-badge ${n.status==='حي'?'alive':'dead'}">${n.status}</div>
    </div>`).join('');
}

// ============================================================
// PERSON CARD
// ============================================================
function selectNode(id) {
  if (selectedId === id) {
    selectedId = null;
    document.getElementById('person-card').classList.remove('open');
    renderTree();
    return;
  }
  selectedId = id;
  renderPersonCard(id);
  renderAll();
}

function renderPersonCard(id) {
  const node = findNode(DB, id);
  if(!node) return;
  const card = document.getElementById('person-card');
  const inner = document.getElementById('card-inner');

  const childrenHTML = (node.children&&node.children.length>0) ? `
    <div class="children-section">
      <div class="section-label">الأبناء والبنات (${node.children.length})</div>
      <div class="children-row">
        ${node.children.map(c=>`
          <div class="child-chip" onclick="selectNode('${c.id}')">
            ${avatarNodeHTML(c, 24)}
            <span class="child-chip-name">${c.name}</span>
          </div>`).join('')}
      </div>
    </div>` : '';

  inner.innerHTML = `
    <div class="card-header">
      <div style="display:flex;gap:14px;align-items:center;">
        ${avatarNodeHTML(node, 68)}
        <div>
          <div class="card-name">${node.name}</div>
          <div class="card-rel">${node.relation||''}</div>
          <div class="status-badge ${node.status==='حي'?'alive':'dead'}" style="display:inline-block;margin-top:4px">${node.status}</div>
        </div>
      </div>
      <button class="card-close" onclick="closeCard()">✕</button>
    </div>
    <div class="card-grid">
      <div class="card-field"><div class="card-field-label">الجنس</div><div class="card-field-val">${node.gender||'—'}</div></div>
      <div class="card-field"><div class="card-field-label">الحالة الاجتماعية</div><div class="card-field-val">${node.maritalStatus||'—'}</div></div>
      <div class="card-field"><div class="card-field-label">الحي / العنوان</div><div class="card-field-val">${node.address||'—'}</div></div>
      <div class="card-field"><div class="card-field-label">الهاتف</div><div class="card-field-val" dir="ltr">${node.phone||'—'}</div></div>
    </div>
    ${childrenHTML}
    <div class="card-actions">
      <button class="card-btn add" onclick="openAddChild('${node.id}')">+ إضافة فرع</button>
      <button class="card-btn edit" onclick="openEdit('${node.id}')">✎ تعديل</button>
      <button class="card-btn rel" onclick="openRelModal('${node.id}')">🔗 صلة القرابة</button>
      <button class="card-btn del" onclick="openConfirmDelete('${node.id}')">🗑 حذف</button>
    </div>`;
  card.classList.add('open');
}

function closeCard() {
  selectedId = null;
  document.getElementById('person-card').classList.remove('open');
  renderAll();
}

// ============================================================
// EXPAND
// ============================================================
function toggleExpand(id) {
  if(expandedNodes.has(id)) expandedNodes.delete(id);
  else expandedNodes.add(id);
  renderTree();
}

function toggleExpandAll() {
  expandAll = !expandAll;
  const btn = document.querySelector('#expand-all-btn button');
  btn.textContent = expandAll ? '🔼 طي الكل' : '🔽 توسيع الكل';
  renderTree();
}

// ============================================================
// VIEW / TAB
// ============================================================
function setTab(t) {
  currentView = t;
  document.getElementById('view-tree').classList.toggle('hidden', t!=='tree');
  document.getElementById('view-list').classList.toggle('hidden', t!=='list');
  document.getElementById('tab-tree').classList.toggle('active', t==='tree');
  document.getElementById('tab-list').classList.toggle('active', t==='list');
  document.getElementById('view-label').textContent = t==='tree'?'قائمة':'شجرة';
  renderAll();
}

function toggleView() {
  setTab(currentView==='tree'?'list':'tree');
}

// ============================================================
// MODALS
// ============================================================
function showModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function hideModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

// --- ADD ANCESTOR ---
function openAddAncestor() { openAddChild('root'); }

// --- ADD CHILD ---
function openAddChild(parentId) {
  const parent = findNode(DB, parentId);
  const pName = parent?.name || 'الجذر';
  showModal(`
    <div class="modal-title">إضافة فرع إلى ${pName}</div>
    <div style="text-align:center;">
      <div class="photo-preview" id="photo-prev" onclick="document.getElementById('photo-file').click()"
        style="background:linear-gradient(135deg,#1a6b8a,#0d3f54);">
        <span style="color:#fff;font-size:28px;">+</span>
      </div>
      <input type="file" id="photo-file" accept="image/*" style="display:none" onchange="previewPhoto()">
      <div class="photo-hint">اضغط لإضافة صورة</div>
    </div>
    <div class="form-group"><label class="form-label">الاسم الكامل *</label>
      <input class="form-input" id="f-name" type="text" placeholder="أدخل الاسم"></div>
    <div class="form-group"><label class="form-label">رقم الهاتف</label>
      <input class="form-input" id="f-phone" type="tel" placeholder="05xxxxxxxx"></div>
    <div class="form-group"><label class="form-label">الحي / العنوان</label>
      <input class="form-input" id="f-address" type="text" placeholder="اسم الحي أو المدينة"></div>
    <div class="form-group"><label class="form-label">الجنس</label>
      <select class="form-select" id="f-gender"><option>ذكر</option><option>أنثى</option></select></div>
    <div class="form-group"><label class="form-label">الحالة الاجتماعية</label>
      <select class="form-select" id="f-marital">${MARITAL.map(m=>`<option>${m}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">الحالة</label>
      <select class="form-select" id="f-status"><option>حي</option><option>متوفى</option></select></div>
    <div class="form-group"><label class="form-label">صلة القرابة</label>
      <select class="form-select" id="f-relation">${RELATIONS.map(r=>`<option>${r}</option>`).join('')}</select></div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveAdd('${parentId}')">حفظ</button>
      <button class="btn-cancel" onclick="hideModal()">إلغاء</button>
    </div>`);
}

function previewPhoto() {
  const file = document.getElementById('photo-file').files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const prev = document.getElementById('photo-prev');
    prev.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    prev.dataset.photo = e.target.result;
  };
  reader.readAsDataURL(file);
}

function saveAdd(parentId) {
  const name = document.getElementById('f-name').value.trim();
  if(!name) { alert('الرجاء إدخال الاسم'); return; }
  const photo = document.getElementById('photo-prev').dataset.photo || null;
  const node = {
    id: genId(), name,
    phone: document.getElementById('f-phone').value.trim(),
    address: document.getElementById('f-address').value.trim(),
    gender: document.getElementById('f-gender').value,
    maritalStatus: document.getElementById('f-marital').value,
    status: document.getElementById('f-status').value,
    relation: document.getElementById('f-relation').value,
    photo, children: []
  };
  addNode(parentId, node);
  hideModal();
  renderAll();
}

// --- EDIT ---
function openEdit(id) {
  const n = findNode(DB, id);
  if(!n) return;
  const photoHTML = n.photo
    ? `<img src="${n.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
    : `<span style="font-size:26px;color:#fff;">${n.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</span>`;
  showModal(`
    <div class="modal-title">تعديل بيانات ${n.name}</div>
    <div style="text-align:center;">
      <div class="photo-preview" id="photo-prev" onclick="document.getElementById('photo-file').click()"
        style="background:linear-gradient(135deg,#1a6b8a,#0d3f54);"
        data-photo="${n.photo||''}">${photoHTML}</div>
      <input type="file" id="photo-file" accept="image/*" style="display:none" onchange="previewPhoto()">
      <div class="photo-hint">اضغط لتغيير الصورة</div>
    </div>
    <div class="form-group"><label class="form-label">الاسم الكامل *</label>
      <input class="form-input" id="f-name" value="${n.name}"></div>
    <div class="form-group"><label class="form-label">رقم الهاتف</label>
      <input class="form-input" id="f-phone" value="${n.phone||''}"></div>
    <div class="form-group"><label class="form-label">الحي / العنوان</label>
      <input class="form-input" id="f-address" value="${n.address||''}"></div>
    <div class="form-group"><label class="form-label">الجنس</label>
      <select class="form-select" id="f-gender">
        <option ${n.gender==='ذكر'?'selected':''}>ذكر</option>
        <option ${n.gender==='أنثى'?'selected':''}>أنثى</option>
      </select></div>
    <div class="form-group"><label class="form-label">الحالة الاجتماعية</label>
      <select class="form-select" id="f-marital">${MARITAL.map(m=>`<option ${n.maritalStatus===m?'selected':''}>${m}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">الحالة</label>
      <select class="form-select" id="f-status">
        <option ${n.status==='حي'?'selected':''}>حي</option>
        <option ${n.status==='متوفى'?'selected':''}>متوفى</option>
      </select></div>
    <div class="form-group"><label class="form-label">صلة القرابة</label>
      <select class="form-select" id="f-relation">${RELATIONS.map(r=>`<option ${n.relation===r?'selected':''}>${r}</option>`).join('')}</select></div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveEdit('${id}')">حفظ</button>
      <button class="btn-cancel" onclick="hideModal()">إلغاء</button>
    </div>`);
}

function saveEdit(id) {
  const name = document.getElementById('f-name').value.trim();
  if(!name) { alert('الرجاء إدخال الاسم'); return; }
  const photo = document.getElementById('photo-prev').dataset.photo || null;
  const n = findNode(DB, id);
  Object.assign(n, {
    name,
    phone: document.getElementById('f-phone').value.trim(),
    address: document.getElementById('f-address').value.trim(),
    gender: document.getElementById('f-gender').value,
    maritalStatus: document.getElementById('f-marital').value,
    status: document.getElementById('f-status').value,
    relation: document.getElementById('f-relation').value,
    photo: photo || n.photo,
  });
  saveDB();
  hideModal();
  if(selectedId===id) renderPersonCard(id);
  renderAll();
}

// --- DELETE ---
function openConfirmDelete(id) {
  const n = findNode(DB, id);
  if(!n) return;
  showModal(`
    <div class="confirm-icon">⚠️</div>
    <div class="confirm-msg">هل تريد حذف <strong style="color:var(--gold)">${n.name}</strong>؟</div>
    <div class="confirm-sub">سيتم حذف جميع الفروع المنتمية لهذا الشخص أيضاً</div>
    <div class="modal-actions">
      <button class="btn-save" style="background:linear-gradient(135deg,#6b1a1a,#4a0d0d);color:#f0c0c0;" onclick="confirmDelete('${id}')">تأكيد الحذف</button>
      <button class="btn-cancel" onclick="hideModal()">إلغاء</button>
    </div>`);
}

function confirmDelete(id) {
  deleteNode(id);
  if(selectedId===id) { selectedId=null; document.getElementById('person-card').classList.remove('open'); }
  hideModal();
  renderAll();
}

// --- RELATION MODAL ---
function openRelModal(personId) {
  const person = findNode(DB, personId);
  if(!personId) return;
  const saved = relSaved[personId] || [];
  const allNodes = getAllNodes(DB).filter(n=>n.id!==personId);
  renderRelModal(personId, person, allNodes, saved, '');
}

function renderRelModal(personId, person, allNodes, saved, q) {
  const filtered = q ? allNodes.filter(n=>n.name.includes(q)) : allNodes;
  const savedHTML = saved.map(s=>`
    <div class="rel-saved-item">
      <span>${person.name} ← ${s.rel} → ${s.targetName}</span>
      <button class="rel-del-btn" onclick="deleteRelSaved('${personId}','${s.targetId}')">✕</button>
    </div>`).join('');

  showModal(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div class="modal-title" style="margin:0">صلة القرابة - ${person.name}</div>
      <button class="btn-cancel" style="padding:5px 12px;font-size:13px;" onclick="hideModal()">إغلاق</button>
    </div>
    <input class="form-input" id="rel-search" placeholder="ابحث عن شخص..." oninput="filterRelPersons('${personId}')" value="${q}" style="margin-bottom:12px;">
    <div id="rel-persons-list" style="max-height:180px;overflow-y:auto;margin-bottom:12px;">
      ${filtered.map(n=>`
        <div class="rel-person-row" id="relrow-${n.id}" onclick="selectRelPerson('${personId}','${n.id}','${n.name}')">
          ${avatarNodeHTML(n,32)}
          <div><div style="color:var(--text);font-size:13px">${n.name}</div><div style="color:var(--text-dim);font-size:10px">${n.relation||''}</div></div>
        </div>`).join('')}
    </div>
    <div id="rel-selector" class="hidden">
      <div style="color:var(--text-dim);font-size:12px;margin-bottom:6px;" id="rel-selector-label"></div>
      <select class="form-select" id="rel-type" style="margin-bottom:10px">${RELATIONS.map(r=>`<option>${r}</option>`).join('')}</select>
      <button class="btn-save" onclick="confirmRelSave('${personId}')">تأكيد الصلة</button>
    </div>
    ${saved.length>0 ? `<div style="margin-top:14px"><div class="section-label">الصلات المحددة:</div>${savedHTML}</div>` : ''}
  `);
}

let _relSelectedId = null, _relSelectedName = null;

function filterRelPersons(personId) {
  openRelModal(personId); // re-render with new query
  // get value after re-render is done via timeout
  setTimeout(()=>{
    const v = document.getElementById('rel-search').value;
    const all = getAllNodes(DB).filter(n=>n.id!==personId);
    const filtered = v ? all.filter(n=>n.name.includes(v)) : all;
    document.getElementById('rel-persons-list').innerHTML = filtered.map(n=>`
      <div class="rel-person-row" id="relrow-${n.id}" onclick="selectRelPerson('${personId}','${n.id}','${n.name}')">
        ${avatarNodeHTML(n,32)}
        <div><div style="color:var(--text);font-size:13px">${n.name}</div><div style="color:var(--text-dim);font-size:10px">${n.relation||''}</div></div>
      </div>`).join('');
  },0);
}

function selectRelPerson(personId, targetId, targetName) {
  _relSelectedId = targetId; _relSelectedName = targetName;
  document.querySelectorAll('.rel-person-row').forEach(r=>r.classList.remove('sel'));
  const row = document.getElementById('relrow-'+targetId);
  if(row) row.classList.add('sel');
  const person = findNode(DB, personId);
  document.getElementById('rel-selector').classList.remove('hidden');
  document.getElementById('rel-selector-label').textContent = `صلة ${person.name} بـ ${targetName}:`;
}

function confirmRelSave(personId) {
  if(!_relSelectedId) return;
  if(!relSaved[personId]) relSaved[personId]=[];
  relSaved[personId] = relSaved[personId].filter(x=>x.targetId!==_relSelectedId);
  relSaved[personId].push({ targetId:_relSelectedId, targetName:_relSelectedName, rel: document.getElementById('rel-type').value });
  openRelModal(personId);
}

function deleteRelSaved(personId, targetId) {
  if(relSaved[personId]) relSaved[personId]=relSaved[personId].filter(x=>x.targetId!==targetId);
  openRelModal(personId);
}
