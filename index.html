<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050e16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="الكادول">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>الكادول - شجرة عائلة جايرنجي</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#d4af37;--gold-dim:rgba(212,175,55,0.22);--bg:#050e16;--bg3:#0d1f2d;--text:#e8d8b0;--dim:#7a9ab5}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Amiri',serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
input,select,button{font-family:'Amiri',serif}
#sp{position:fixed;inset:0;z-index:99999;background:#050e16;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
#sp-logo{width:130px;height:130px;border-radius:26px;overflow:hidden;border:2px solid rgba(212,175,55,0.4);background:#fff;padding:6px;box-shadow:0 0 40px rgba(212,175,55,0.2);animation:spIn 1s cubic-bezier(.34,1.56,.64,1) forwards}
#sp-logo img{width:100%;height:100%;object-fit:contain;border-radius:18px}
@keyframes spIn{from{opacity:0;transform:scale(0.3)}to{opacity:1;transform:scale(1)}}
#sp-t{font-family:'Amiri',serif;font-size:46px;font-weight:bold;color:#d4af37;letter-spacing:4px;margin-top:24px;text-shadow:0 0 30px rgba(212,175,55,0.6);animation:spUp .8s ease .6s both}
#sp-s{font-family:'Amiri',serif;font-size:15px;color:rgba(138,180,210,0.8);margin-top:8px;animation:spUp .8s ease .9s both}
#sp-dots{display:flex;gap:10px;margin-top:44px;animation:spUp .5s ease 1.2s both}
.sdt{width:8px;height:8px;border-radius:50%;background:rgba(212,175,55,0.5);animation:sdB 1.2s ease-in-out infinite}
.sdt:nth-child(2){animation-delay:.2s}.sdt:nth-child(3){animation-delay:.4s}
.sr{position:absolute;border-radius:50%;border:1px solid rgba(212,175,55,0.12);animation:srP 2.5s ease-in-out infinite}
.sr1{width:180px;height:180px;top:calc(50% - 90px);left:calc(50% - 90px)}
.sr2{width:250px;height:250px;top:calc(50% - 125px);left:calc(50% - 125px);animation-delay:.6s}
#sp-tap{font-size:12px;color:rgba(212,175,55,0.4);margin-top:16px;animation:spUp .5s ease 1.5s both}
@keyframes spUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes sdB{0%,100%{transform:translateY(0);background:rgba(212,175,55,0.35)}50%{transform:translateY(-9px);background:#d4af37}}
@keyframes srP{0%,100%{transform:scale(.95);opacity:.3}50%{transform:scale(1.05);opacity:.8}}
#hdr{background:linear-gradient(135deg,#06111c,#0a1e32,#06111c);border-bottom:1px solid var(--gold-dim);padding:0 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:90;box-shadow:0 4px 20px rgba(0,0,0,0.5);height:52px}
#hdr-icon{width:36px;height:36px;border-radius:9px;border:1px solid var(--gold-dim);overflow:hidden;flex-shrink:0}
#hdr-icon img{width:100%;height:100%;object-fit:cover}
#hdr-text h1{font-size:18px;color:var(--gold);letter-spacing:2px;line-height:1.1}
#hdr-text p{font-size:10px;color:var(--dim)}
#hdr-btns{display:flex;gap:6px;margin-right:auto}
.hbtn{background:rgba(212,175,55,0.1);border:1px solid var(--gold-dim);color:var(--gold);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:11px;white-space:nowrap}
.hbtn.g{background:linear-gradient(135deg,#1a6b3a,#0d4025);color:#c8f0d0;border-color:transparent}
#srch{padding:10px 14px;background:rgba(0,0,0,0.25);border-bottom:1px solid rgba(255,255,255,0.04)}
#srch input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--gold-dim);border-radius:12px;color:var(--text);padding:9px 14px;font-size:14px;outline:none}
#srch input::placeholder{color:var(--dim)}
#stats{display:flex;gap:8px;padding:8px 14px;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,0.04);scrollbar-width:none}
#stats::-webkit-scrollbar{display:none}
.sbox{background:rgba(255,255,255,0.04);border-radius:10px;padding:6px 14px;flex-shrink:0;text-align:center;min-width:68px}
.sv{font-size:18px;font-weight:bold}.sl{color:var(--dim);font-size:10px}
#tabs{display:flex;background:rgba(0,0,0,0.25);border-bottom:1px solid rgba(255,255,255,0.05)}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:13px;color:var(--dim);border-bottom:2px solid transparent;transition:all .2s}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
#main{padding:14px;padding-bottom:130px}
#ibanner{background:linear-gradient(90deg,#0a2a18,#163a22);border:1px solid rgba(80,220,130,.25);border-radius:12px;margin:10px 14px;padding:11px 13px;display:flex;align-items:center;gap:11px}
.ib-t{color:#50e090;font-size:13px;font-weight:bold}.ib-s{color:#3a9a60;font-size:11px;margin-top:2px}
.ib-btn{background:#1a6b3a;color:#c8f0d0;border:none;border-radius:8px;padding:7px 13px;cursor:pointer;font-size:12px}
.ib-x{background:none;border:none;color:#3a7a50;cursor:pointer;font-size:18px}
#empty-state{display:flex;flex-direction:column;align-items:center;padding:48px 24px;text-align:center}
.esi{font-size:64px;margin-bottom:16px;opacity:.7}
#empty-state h2{color:var(--gold);font-size:20px;margin-bottom:8px}
#empty-state p{color:var(--dim);font-size:14px;line-height:1.7;margin-bottom:24px}
#empty-state button{background:linear-gradient(135deg,#1a6b3a,#0d4025);color:#c8f0d0;border:none;border-radius:12px;padding:12px 28px;font-size:16px;cursor:pointer}
.anc-row{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;padding:8px 0}
.anc-card{display:flex;flex-direction:column;align-items:center;cursor:pointer;min-width:76px}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;position:relative;border:2px solid var(--gold-dim);transition:all .2s;cursor:pointer}
.avatar.sel{border-color:var(--gold);box-shadow:0 0 18px rgba(212,175,55,0.45)}
.avatar.m{background:linear-gradient(135deg,#1a6b8a,#0d3f54)}
.avatar.f{background:linear-gradient(135deg,#8a3a6b,#540d3f)}
.avatar.dead{background:linear-gradient(135deg,#3a3a3a,#1a1a1a);border-color:#555}
.avatar img{width:100%;height:100%;object-fit:cover}
.ini{color:#fff;font-weight:bold}
.dead-lbl{position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.65);color:#999;font-size:8px;text-align:center;padding:1px 0}
.nname{text-align:center;margin-top:6px;max-width:76px;font-size:11px;color:#c8b870;line-height:1.3}
.nname.big{font-size:13px;color:var(--gold);font-weight:bold;max-width:90px}
.exp-badge{background:#1a4060;color:var(--gold);border-radius:20px;font-size:9px;padding:1px 6px;border:1px solid var(--gold-dim);margin-top:4px;cursor:pointer}
.node-wrap{display:flex;flex-direction:column;align-items:center}
.node-kids{display:flex;gap:8px;position:relative}
.node-kids::before{content:'';position:absolute;top:0;left:12%;right:12%;height:1px;background:var(--gold-dim)}
.node-col{display:flex;flex-direction:column;align-items:center}
.vline{width:1px;background:var(--gold-dim)}
.litem{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.03);border:1px solid transparent;border-radius:12px;padding:10px 12px;margin-bottom:8px;cursor:pointer}
.litem.sel{background:rgba(212,175,55,0.07);border-color:var(--gold-dim)}
.lname{font-size:15px;color:#d4c080}.lsub{font-size:11px;color:#5a8a9a;margin-top:2px}
.sbadge{border-radius:20px;padding:3px 10px;font-size:11px}
.sbadge.alive{background:rgba(40,180,80,.15);color:#50e090}
.sbadge.dead{background:rgba(120,120,120,.15);color:#888}
#pcard{position:fixed;bottom:0;left:0;right:0;background:rgba(4,12,20,.98);border-top:1px solid var(--gold-dim);padding:14px;z-index:200;max-height:72vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s ease}
#pcard.open{transform:translateY(0)}
.card-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.cclose{background:none;border:none;color:#555;cursor:pointer;font-size:22px;padding:4px}
.cname{color:var(--gold);font-size:20px;font-weight:bold}.crel{color:var(--dim);font-size:13px}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.cf{background:rgba(255,255,255,0.04);border-radius:8px;padding:6px 10px}
.cfl{color:#7a9ab5;font-size:10px;margin-bottom:2px}.cfv{color:#e0d0b0;font-size:13px}
.csec{margin-bottom:14px}.csec-lbl{color:var(--dim);font-size:11px;margin-bottom:6px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.chip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.05);border-radius:20px;padding:3px 10px 3px 5px;cursor:pointer}
.chip-name{color:#c8b870;font-size:12px}
.cacts{display:flex;gap:7px;flex-wrap:wrap}
.cbtn{border:none;border-radius:8px;padding:7px 13px;cursor:pointer;font-size:12px;color:var(--text)}
.cbtn.add{background:linear-gradient(135deg,#1a6b3a,#0d4025);color:#c8f0d0}
.cbtn.edt{background:linear-gradient(135deg,#1a4a6b,#0d2a4a);color:#c8e0f0}
.cbtn.rel{background:linear-gradient(135deg,#5a3a1a,#3a2010);color:#f0d8a0}
.cbtn.del{background:linear-gradient(135deg,#6b1a1a,#4a0d0d);color:#f0c0c0}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px}
.mbox{background:linear-gradient(160deg,#08161f,#0b1e2e);border:1px solid var(--gold-dim);border-radius:20px;padding:22px;width:100%;max-width:420px;max-height:92vh;overflow-y:auto}
.mtitle{color:var(--gold);font-size:19px;margin-bottom:16px;font-weight:bold}
.fg{margin-bottom:13px}.fl{color:var(--dim);font-size:12px;display:block;margin-bottom:4px}
.fi{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--gold-dim);border-radius:8px;color:var(--text);padding:9px 12px;font-size:14px;outline:none}
.fs{width:100%;background:var(--bg3);border:1px solid var(--gold-dim);border-radius:8px;color:var(--text);padding:9px 12px;font-size:14px;outline:none}
.macts{display:flex;gap:10px;margin-top:18px}
.bsave{flex:1;background:linear-gradient(135deg,#1a6b3a,#0d4025);color:#c8f0d0;border:none;border-radius:10px;padding:11px;cursor:pointer;font-size:15px}
.bcancel{flex:1;background:rgba(255,255,255,0.06);color:var(--dim);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:11px;cursor:pointer;font-size:15px}
.photo-ring{width:90px;height:90px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;border:2px solid var(--gold-dim);background:linear-gradient(135deg,#1a6b8a,#0d3f54)}
.photo-hint{color:#5a7a8a;font-size:11px;text-align:center;margin-bottom:14px}
.rrow{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:4px;border:1px solid transparent}
.rrow.sel{background:rgba(212,175,55,0.1);border-color:var(--gold-dim)}
.rsaved{background:rgba(212,175,55,0.07);border-radius:8px;padding:6px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.rdel{background:none;border:none;color:#854;cursor:pointer;font-size:16px}
.cico{font-size:44px;text-align:center;margin-bottom:12px}
.cmsg{color:var(--text);font-size:16px;text-align:center;margin-bottom:7px}
.csub{color:var(--dim);font-size:12px;text-align:center;margin-bottom:20px}
#exp-btn{display:flex;justify-content:center;margin-bottom:10px}
#exp-btn button{background:rgba(255,255,255,0.05);border:1px solid var(--gold-dim);color:var(--dim);border-radius:8px;padding:5px 16px;cursor:pointer;font-size:12px}
.hidden{display:none!important}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:4px}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.su{animation:su .25s ease}
</style>
</head>

    <button class="hbtn" onclick="exitApp()" style="background:rgba(107,26,26,0.4);border-color:rgba(180,60,60,0.3);color:#f0a0a0;">🚪</button>
  </div>
</div>
<div id="ibanner">
  <div style="font-size:22px">📲</div>
  <div style="flex:1"><div class="ib-t">أضف للشاشة الرئيسية</div><div class="ib-s">يعمل بدون إنترنت</div></div>
  <button class="ib-btn" onclick="showInstall()">كيف؟</button>
  <button class="ib-x" onclick="this.parentElement.style.display='none'">✕</button>
</div>
<div id="srch"><input type="text" id="sq" placeholder="🔍 ابحث عن عضو في العائلة..." oninput="renderAll()"></div>
<div id="stats"></div>
<div id="tabs">
  <div class="tab on" onclick="setTab('tree')" id="tab-tree">🌳 الشجرة</div>
  <div class="tab" onclick="setTab('list')" id="tab-list">📋 القائمة</div>
</div>
<div id="main">
  <div id="vt">
    <div id="exp-btn"><button onclick="toggleExpAll()">🔽 توسيع الكل</button></div>
    <div id="tc"></div>
  </div>
  <div id="vl" class="hidden"></div>
</div>
<div id="pcard"><div id="pci"></div></div>
<div id="mov" class="moverlay hidden"><div id="mbox" class="mbox"></div></div>
<script>

(function() {
  var sp = document.getElementById('sp');
  function hideSp() {
    sp.style.transition = 'opacity 0.5s ease';
    sp.style.opacity = '0';
    setTimeout(function() { sp.remove(); }, 520);
  }
  setTimeout(hideSp, 3000);
  sp.addEventListener('click', hideSp);
  sp.addEventListener('touchend', function(e) { e.preventDefault(); hideSp(); });
})();

var RELS = ["جد","جدة","أب","أم","ابن","ابنة","أخ","أخت","عم","عمة","خال","خالة","ابن عم","ابنة عم","ابن خال","ابنة خال","حفيد","حفيدة","زوج","زوجة","صهر","كنة","قريب","قريبة"];
var MARITAL = ["أعزب","أعزبة","متزوج","متزوجة","مطلق","مطلقة","أرمل","أرملة"];
var DEFAULT = {id:"root",name:"جايرنجي",type:"family",children:[]};
var DB = JSON.parse(localStorage.getItem('kadoul_v3') || 'null') || DEFAULT;
var selId = null, curView = 'tree', expAll = false;
var expanded = {};
var relSaved = JSON.parse(localStorage.getItem('kadoul_rels3') || '{}');

function save() {
  localStorage.setItem('kadoul_v3', JSON.stringify(DB));
  localStorage.setItem('kadoul_rels3', JSON.stringify(relSaved));
}
function gid() { return 'n' + Date.now() + Math.random().toString(36).slice(2,5); }
function find(tree, id) {
  if (!tree) return null;
  if (tree.id === id) return tree;
  var ch = tree.children || [];
  for (var i = 0; i < ch.length; i++) { var f = find(ch[i], id); if (f) return f; }
  return null;
}
function allNodes(tree) {
  if (!tree || tree.id === 'root') {
    var res = [], ch = tree ? (tree.children||[]) : [];
    for (var i=0; i<ch.length; i++) res = res.concat(allNodes(ch[i]));
    return res;
  }
  var r = [tree], ch = tree.children||[];
  for (var i=0; i<ch.length; i++) r = r.concat(allNodes(ch[i]));
  return r;
}
function delNode(id) {
  function rm(p) {
    if (!p.children) return;
    p.children = p.children.filter(function(c){return c.id!==id;});
    p.children.forEach(rm);
  }
  rm(DB); save();
}
function renderAll() { renderStats(); curView==='tree' ? renderTree() : renderList(); }
function renderStats() {
  var all = allNodes(DB);
  var data = [
    {v:all.length,l:'الأفراد',c:'#d4af37'},
    {v:all.filter(function(n){return n.status==='حي';}).length,l:'الأحياء',c:'#50e090'},
    {v:all.filter(function(n){return n.status==='متوفى';}).length,l:'المتوفون',c:'#888'},
    {v:all.filter(function(n){return n.gender==='ذكر';}).length,l:'ذكور',c:'#5ab0e0'},
    {v:all.filter(function(n){return n.gender==='أنثى';}).length,l:'إناث',c:'#e05ab0'}
  ];
  document.getElementById('stats').innerHTML = data.map(function(s){
    return '<div class="sbox"><div class="sv" style="color:'+s.c+'">'+s.v+'</div><div class="sl">'+s.l+'</div></div>';
  }).join('');
}
function avH(n, sz) {
  sz = sz||52;
  var gc = n.gender==='ذكر' ? 'm' : 'f';
  var dc = n.status==='متوفى' ? ' dead' : '';
  var sc = selId===n.id ? ' sel' : '';
  var ini = n.name.split(' ').map(function(w){return w[0];}).join('').slice(0,2);
  var inner = n.photo ? '<img src="'+n.photo+'" alt="">' : '<span class="ini" style="font-size:'+Math.round(sz*.28)+'px">'+ini+'</span>';
  var dead = n.status==='متوفى' ? '<div class="dead-lbl">رحمه الله</div>' : '';
  return '<div class="avatar '+gc+dc+sc+'" style="width:'+sz+'px;height:'+sz+'px">'+inner+dead+'</div>';
}
function oc(id) { return 'onclick="selNode(\''+id+'\')"'; }
function renderTree() {
  var q = document.getElementById('sq').value.trim();
  var tc = document.getElementById('tc');
  if (!DB.children||DB.children.length===0) {
    tc.innerHTML='<div id="empty-state" class="su"><div class="esi">🌳</div><h2>ابدأ شجرتك العائلية</h2><p>لا يوجد أفراد بعد<br>اضغط الزر أدناه لإضافة أول جد</p><button onclick="openAddAnc()">+ إضافة الجد الأول</button></div>';
    return;
  }
  if (q) {
    var fil=allNodes(DB).filter(function(n){return n.name.indexOf(q)>=0;});
    tc.innerHTML='<div class="anc-row su">'+fil.map(function(n){
      return '<div style="display:flex;flex-direction:column;align-items:center;cursor:pointer" '+oc(n.id)+'>'+avH(n,60)+'<div class="nname">'+n.name+'</div></div>';
    }).join('')+'</div>';
    return;
  }
  tc.innerHTML='<div class="anc-row su">'+DB.children.map(ancH).join('')+'</div>';
  if (selId&&(expanded[selId]||expAll)) {
    var node=find(DB,selId);
    if (node&&node.children&&node.children.length>0) {
      var d=document.createElement('div');
      d.style.cssText='margin-top:8px;overflow-x:auto;padding:4px;';
      d.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;">'+nodeH(node,0)+'</div>';
      tc.appendChild(d);
    }
  }
}
function ancH(n) {
  var cc=(n.children||[]).length;
  var isExp=expAll||expanded[n.id];
  var badge=cc>0 ? '<div class="exp-badge" onclick="event.stopPropagation();togExp(\''+n.id+'\')">'+cc+' '+(isExp?'▲':'▼')+'</div>' : '';
  return '<div class="anc-card" '+oc(n.id)+'>'+avH(n,70)+'<div class="nname big">'+n.name+'</div>'+badge+'</div>';
}
function nodeH(n, depth) {
  var sz=depth===0?66:depth===1?52:42;
  var hasKids=n.children&&n.children.length>0;
  var isExp=expAll||expanded[n.id];
  var kH='';
  if (hasKids&&isExp) {
    kH='<div style="width:1px;height:14px;background:var(--gold-dim);margin:0 auto"></div><div class="node-kids">';
    kH+=n.children.map(function(c){return '<div class="node-col"><div class="vline" style="height:12px"></div>'+nodeH(c,depth+1)+'</div>';}).join('');
    kH+='</div>';
  }
  var badge=hasKids?'<div class="exp-badge" onclick="event.stopPropagation();togExp(\''+n.id+'\')">'+n.children.length+' '+(isExp?'▲':'▼')+'</div>':'';
  return '<div class="node-wrap"><div style="display:flex;flex-direction:column;align-items:center;cursor:pointer" '+oc(n.id)+'>'+avH(n,sz)+'<div class="nname'+(depth===0?' big':'')+'">'+n.name+'</div>'+badge+'</div>'+kH+'</div>';
}
function renderList() {
  var q=document.getElementById('sq').value.trim();
  var all=allNodes(DB).filter(function(n){return !q||n.name.indexOf(q)>=0;});
  if (all.length===0) {document.getElementById('vl').innerHTML='<div style="text-align:center;padding:48px;color:var(--dim)">'+(q?'لا توجد نتائج':'لا يوجد أفراد بعد')+'</div>';return;}
  document.getElementById('vl').innerHTML=all.map(function(n){
    return '<div class="litem'+(selId===n.id?' sel':'')+'" '+oc(n.id)+'>'+avH(n,44)+'<div style="flex:1"><div class="lname">'+n.name+'</div><div class="lsub">'+(n.relation||'')+' · '+(n.address||'—')+' · '+(n.phone||'—')+'</div></div><div class="sbadge '+(n.status==='حي'?'alive':'dead')+'">'+n.status+'</div></div>';
  }).join('');
}
function selNode(id) {
  if (selId===id){selId=null;closeCard();renderAll();return;}
  selId=id;showCard(id);renderAll();
}
function showCard(id) {
  var n=find(DB,id);if(!n)return;
  var kids=n.children||[], rels=relSaved[id]||[];
  var kH='';
  if (kids.length>0) {
    kH='<div class="csec"><div class="csec-lbl">الأبناء والبنات ('+kids.length+')</div><div class="chips">';
    kH+=kids.map(function(c){return '<div class="chip" onclick="selNode(\''+c.id+'\')">'+avH(c,24)+'<span class="chip-name">'+c.name+'</span></div>';}).join('');
    kH+='</div></div>';
  }
  var rH=rels.length>0?'<div class="csec"><div class="csec-lbl">صلات القرابة</div>'+rels.map(function(r){return '<div style="color:#c8b060;font-size:12px;padding:2px 0">'+n.name+' ← '+r.rel+' → '+r.tname+'</div>';}).join('')+'</div>':'';
  document.getElementById('pci').innerHTML=
    '<div class="card-hdr"><div style="display:flex;gap:13px;align-items:center">'+avH(n,68)+
    '<div><div class="cname">'+n.name+'</div><div class="crel">'+(n.relation||'')+'</div>'+
    '<div class="sbadge '+(n.status==='حي'?'alive':'dead')+'" style="display:inline-block;margin-top:4px">'+n.status+'</div></div></div>'+
    '<button class="cclose" onclick="closeCard()">✕</button></div>'+
    '<div class="cgrid">'+
    '<div class="cf"><div class="cfl">الجنس</div><div class="cfv">'+(n.gender||'—')+'</div></div>'+
    '<div class="cf"><div class="cfl">الحالة الاجتماعية</div><div class="cfv">'+(n.maritalStatus||'—')+'</div></div>'+
    '<div class="cf"><div class="cfl">الحي / العنوان</div><div class="cfv">'+(n.address||'—')+'</div></div>'+
    '<div class="cf"><div class="cfl">الهاتف</div><div class="cfv" dir="ltr">'+(n.phone||'—')+'</div></div>'+
    '</div>'+kH+rH+
    '<div class="cacts">'+
    '<button class="cbtn add" onclick="openAdd(\''+id+'\')">+ إضافة فرع</button>'+
    '<button class="cbtn edt" onclick="openEdit(\''+id+'\')">✎ تعديل</button>'+
    '<button class="cbtn rel" onclick="openRel(\''+id+'\')">🔗 صلة القرابة</button>'+
    '<button class="cbtn del" onclick="openDel(\''+id+'\')">🗑 حذف</button>'+
    '</div>';
  document.getElementById('pcard').classList.add('open');
}
function closeCard(){selId=null;document.getElementById('pcard').classList.remove('open');}
function togExp(id){expanded[id]=!expanded[id];renderAll();}
function toggleExpAll(){expAll=!expAll;document.querySelector('#exp-btn button').textContent=expAll?'🔼 طي الكل':'🔽 توسيع الكل';renderAll();}
function setTab(t){
  curView=t;
  document.getElementById('vt').classList.toggle('hidden',t!=='tree');
  document.getElementById('vl').classList.toggle('hidden',t!=='list');
  document.getElementById('tab-tree').classList.toggle('on',t==='tree');
  document.getElementById('tab-list').classList.toggle('on',t==='list');
  document.getElementById('vlbl').textContent=t==='tree'?'قائمة':'شجرة';
  renderAll();
}
function toggleView(){setTab(curView==='tree'?'list':'tree');}
function showModal(h){document.getElementById('mbox').innerHTML=h;document.getElementById('mov').classList.remove('hidden');}
function hideModal(){document.getElementById('mov').classList.add('hidden');}
document.getElementById('mov').addEventListener('click',function(e){if(e.target===this)hideModal();});
function ropts(c){return RELS.map(function(r){return '<option'+(r===c?' selected':'')+'>'+r+'</option>';}).join('');}
function mopts(c){return MARITAL.map(function(m){return '<option'+(m===c?' selected':'')+'>'+m+'</option>';}).join('');}
function frmH(title,v,btnFn){
  var pi=v.photo?'<img src="'+v.photo+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">':'<span style="font-size:32px">📷</span>';
  return '<div class="mtitle">'+title+'</div>'+
    '<div style="text-align:center;margin-bottom:14px">'+
    '<div class="photo-ring" id="pring" data-photo="'+(v.photo||'')+'" onclick="triggerPhoto()">'+pi+'</div>'+
    '<input type="file" id="pfile" accept="image/*" style="display:none" onchange="prevP()">'+
    '<div class="photo-hint">اضغط الدائرة لإضافة صورة</div></div>'+
    '<div class="fg"><label class="fl">الاسم الكامل *</label><input class="fi" id="fn" value="'+(v.name||'')+'" placeholder="أدخل الاسم"></div>'+
    '<div class="fg"><label class="fl">رقم الهاتف</label><input class="fi" id="fp" value="'+(v.phone||'')+'" type="tel"></div>'+
    '<div class="fg"><label class="fl">الحي / العنوان</label><input class="fi" id="fa" value="'+(v.address||'')+'"></div>'+
    '<div class="fg"><label class="fl">الجنس</label><select class="fs" id="fg2"><option'+(v.gender==='ذكر'?' selected':'')+'>ذكر</option><option'+(v.gender==='أنثى'?' selected':'')+'>أنثى</option></select></div>'+
    '<div class="fg"><label class="fl">الحالة الاجتماعية</label><select class="fs" id="fm">'+mopts(v.maritalStatus)+'</select></div>'+
    '<div class="fg"><label class="fl">الحالة</label><select class="fs" id="fst"><option'+(v.status==='حي'?' selected':'')+'>حي</option><option'+(v.status==='متوفى'?' selected':'')+'>متوفى</option></select></div>'+
    '<div class="fg"><label class="fl">صلة القرابة</label><select class="fs" id="fr">'+ropts(v.relation)+'</select></div>'+
    '<div class="macts"><button class="bsave" onclick="'+btnFn+'">حفظ</button><button class="bcancel" onclick="hideModal()">إلغاء</button></div>';
}
function triggerPhoto(){var inp=document.getElementById('pfile');if(inp){inp.value='';inp.click();}}
function prevP(){
  var inp=document.getElementById('pfile');
  if(!inp||!inp.files||!inp.files[0])return;
  var reader=new FileReader();
  reader.onload=function(e){
    var ring=document.getElementById('pring');
    if(ring){ring.innerHTML='<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';ring.dataset.photo=e.target.result;}
  };
  reader.readAsDataURL(inp.files[0]);
}
function getF(){
  var ring=document.getElementById('pring');
  var photo=ring?(ring.dataset.photo||null):null;
  return{name:document.getElementById('fn').value.trim(),phone:document.getElementById('fp').value.trim(),address:document.getElementById('fa').value.trim(),gender:document.getElementById('fg2').value,maritalStatus:document.getElementById('fm').value,status:document.getElementById('fst').value,relation:document.getElementById('fr').value,photo:photo};
}
function openAddAnc(){openAdd('root');}
function openAdd(pid){
  var p=find(DB,pid), pn=pid==='root'?'الشجرة':(p?p.name:'');
  showModal(frmH('إضافة فرع إلى '+pn,{name:'',phone:'',address:'',gender:'ذكر',maritalStatus:'أعزب',status:'حي',relation:'ابن',photo:null},"saveAdd('"+pid+"')"));
}
function saveAdd(pid){
  var f=getF();if(!f.name){alert('الرجاء إدخال الاسم');return;}
  var node={id:gid(),name:f.name,phone:f.phone,address:f.address,gender:f.gender,maritalStatus:f.maritalStatus,status:f.status,relation:f.relation,photo:f.photo,children:[]};
  var p=find(DB,pid);if(p){if(!p.children)p.children=[];p.children.push(node);}
  save();hideModal();renderAll();
}
function openEdit(id){var n=find(DB,id);if(!n)return;showModal(frmH('تعديل بيانات '+n.name,n,"saveEdit('"+id+"')"));}
function saveEdit(id){
  var f=getF();if(!f.name){alert('الرجاء إدخال الاسم');return;}
  var n=find(DB,id);
  n.name=f.name;n.phone=f.phone;n.address=f.address;n.gender=f.gender;n.maritalStatus=f.maritalStatus;n.status=f.status;n.relation=f.relation;
  if(f.photo)n.photo=f.photo;
  save();hideModal();if(selId===id)showCard(id);renderAll();
}
function openDel(id){
  var n=find(DB,id);if(!n)return;
  showModal('<div class="cico">⚠️</div><div class="cmsg">هل تريد حذف <strong style="color:var(--gold)">'+n.name+'</strong>؟</div><div class="csub">سيتم حذف جميع الفروع المنتمية لهذا الشخص</div><div class="macts"><button class="bsave" style="background:linear-gradient(135deg,#6b1a1a,#4a0d0d);color:#f0c0c0" onclick="confirmDel(\''+id+'\')">تأكيد الحذف</button><button class="bcancel" onclick="hideModal()">إلغاء</button></div>');
}
function confirmDel(id){delNode(id);if(selId===id){selId=null;document.getElementById('pcard').classList.remove('open');}hideModal();renderAll();}
var _rid=null,_rname=null;
function openRel(pid){var p=find(DB,pid);if(!p)return;_rid=null;_rname=null;renderRelM(pid,p,'');}
function renderRelM(pid,p,q){
  var all=allNodes(DB).filter(function(n){return n.id!==pid;});
  var fil=q?all.filter(function(n){return n.name.indexOf(q)>=0;}):all;
  var saved=relSaved[pid]||[];
  var rowsHtml=fil.map(function(n){
    return '<div class="rrow'+(n.id===_rid?' sel':'')+'" onclick="pickRel(\''+pid+'\',\''+n.id+'\',\''+n.name+'\')">'+avH(n,30)+'<div><div style="color:var(--text);font-size:13px">'+n.name+'</div><div style="color:var(--dim);font-size:10px">'+(n.relation||'')+'</div></div></div>';
  }).join('');
  var selHtml=_rid?'<div style="color:var(--dim);font-size:12px;margin-bottom:5px">صلة '+p.name+' بـ '+_rname+':</div><select class="fs" id="rtype" style="margin-bottom:10px">'+RELS.map(function(r){return '<option>'+r+'</option>';}).join('')+'</select><button class="bsave" onclick="confirmRel(\''+pid+'\')">تأكيد الصلة</button>':'';
  var savedHtml=saved.length>0?'<div style="margin-top:14px"><div class="csec-lbl">الصلات المحددة:</div>'+saved.map(function(s){return '<div class="rsaved"><span>'+p.name+' ← '+s.rel+' → '+s.tname+'</span><button class="rdel" onclick="delRel(\''+pid+'\',\''+s.tid+'\')">✕</button></div>';}).join('')+'</div>':'';
  showModal('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div class="mtitle" style="margin:0">صلة القرابة - '+p.name+'</div><button class="bcancel" style="padding:5px 12px;font-size:13px" onclick="hideModal()">إغلاق</button></div><input class="fi" id="rsq" placeholder="ابحث..." value="'+q+'" oninput="filterRel(\''+pid+'\')" style="margin-bottom:10px"><div style="max-height:170px;overflow-y:auto;margin-bottom:10px">'+rowsHtml+'</div><div>'+selHtml+'</div>'+savedHtml);
}
function filterRel(pid){var p=find(DB,pid);renderRelM(pid,p,document.getElementById('rsq').value);}
function pickRel(pid,tid,tname){_rid=tid;_rname=tname;var p=find(DB,pid);renderRelM(pid,p,document.getElementById('rsq')?document.getElementById('rsq').value:'');}
function confirmRel(pid){if(!_rid)return;if(!relSaved[pid])relSaved[pid]=[];relSaved[pid]=relSaved[pid].filter(function(x){return x.tid!==_rid;});relSaved[pid].push({tid:_rid,tname:_rname,rel:document.getElementById('rtype').value});save();var p=find(DB,pid);renderRelM(pid,p,'');}
function delRel(pid,tid){if(relSaved[pid])relSaved[pid]=relSaved[pid].filter(function(x){return x.tid!==tid;});save();var p=find(DB,pid);renderRelM(pid,p,'');}
